name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github_release:
    runs-on: macos-latest
    steps:
      - id: get-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ vars.CODE_OPS_APP_ID }}
          private_key: ${{ secrets.CODE_OPS_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.get-token.outputs.token }}
          fetch-depth: 0

      - name: Get version from podspec
        id: version
        run: |
          VERSION=$(grep -m1 "s.version" TenjinSDK.podspec | sed "s/.*\"\(.*\)\"/\1/")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.version }}" >/dev/null; then
            echo "Tag ${{ steps.version.outputs.version }} already exists; aborting release."
            exit 1
          fi

      - name: Extract release notes
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract only the bullet points for the current version from RELEASE_NOTES.md
          NOTES=$(awk "/^v${VERSION}\$/{found=1; next} /^----\$/{if(found) {capture=1; next}} /^v[0-9]/{if(capture) exit} capture && /^- /{print}" RELEASE_NOTES.md)
          # Use EOF delimiter for multiline output
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ steps.get-token.outputs.token }}
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ steps.release_notes.outputs.notes }}

  cocoapods_release:
    needs: [github_release]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Publish to CocoaPods
        run: pod trunk push TenjinSDK.podspec
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
