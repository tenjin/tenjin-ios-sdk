name: Release

on:
  push:
    branches: [master]
    paths:
      - 'TenjinSDK.xcframework/**'
      - 'TenjinSDK.h'
      - 'TenjinSDK.podspec'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github_release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from podspec
        id: version
        run: |
          VERSION=$(grep -m1 "s.version" TenjinSDK.podspec | sed "s/.*\"\(.*\)\"/\1/")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.version }}" >/dev/null; then
            echo "Tag ${{ steps.version.outputs.version }} already exists; skipping release."
            exit 1
          fi

      - name: Extract release notes
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract only the bullet points for the current version from RELEASE_NOTES.md
          NOTES=$(awk "/^v${VERSION}\$/{found=1; next} /^----\$/{if(found) {capture=1; next}} /^v[0-9]/{if(capture) exit} capture && /^- /{print}" RELEASE_NOTES.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Package release assets
        run: |
          zip -r TenjinSDK.xcframework.zip TenjinSDK.xcframework

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ steps.release_notes.outputs.notes }}
          files: |
            TenjinSDK.xcframework.zip
            TenjinSDK.h
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cocoapods_release:
    needs: [github_release]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Publish to CocoaPods
        run: pod trunk push TenjinSDK.podspec
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
